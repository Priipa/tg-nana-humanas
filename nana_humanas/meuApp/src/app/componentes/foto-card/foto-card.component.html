<article class="foto-card" role="listitem">
  <div class="foto-card__thumb">
    @if (thumbUrl(); as url) {
      <button
        type="button"
        class="foto-card__thumb-hit"
        (click)="visualizarFoto.emit({ url, alt: 'Foto de ' + nome() })"
        aria-label="Ver foto em ecrã inteiro"
      >
        <img [src]="url" [alt]="'Foto de ' + nome()" class="foto-card__img" />
      </button>
    } @else {
      <div class="foto-card__placeholder" aria-hidden="true">
        <ion-icon name="image-outline" />
      </div>
    }
    <span class="foto-card__cam" aria-hidden="true">
      <ion-icon name="camera-outline" />
    </span>
  </div>
  <div class="foto-card__meta">
    <p class="foto-card__line">Nome: {{ nome() }}</p>
    <p class="foto-card__line">Registro: {{ fotografo() }}</p>
  </div>
</article>
